<!DOCTYPE html>
<html>
<head>
    <title>Task 4</title>

    <style>
        body {
            background-color: #f5f5f5; 
        }

        table {
            border: 5px solid #666565;
            width: 400px;
            border-collapse: separate; 
            border-spacing: 8px; 
            text-align: center;
            background-color: #ded7d7; 
        }

        th, td {
            border: 1px solid black;
            padding: 15px; 
            background-color: #ded7d7;
            color: black; 
        }

     
        .text-black   { color: black; }
        .text-red     { color: red; }
        .text-green   { color: green; }
        .text-blue    { color: blue; }
        .text-yellow  { color: goldenrod; }
        .text-magenta { color: magenta; }
        .text-cyan    { color: cyan; }
        .text-white   { color: black; } 
        .text-mycolor { color: #d0b000; } 
        
        
        .bg-black   { background-color: #000000; color: white; }
        .bg-red     { background-color: #ff0000; color: black; }
        .bg-green   { background-color: #00ff00; color: black; }
        .bg-blue    { background-color: #0000ff; color: black; }
        .bg-yellow  { background-color: #ffff00; color: black; }
        .bg-magenta { background-color: #ff00ff; color: black; }
        .bg-cyan    { background-color: #00ffff; color: black; }
        .bg-white   { background-color: #ffffff; color: black; }
        .bg-mycolor { background-color: #d0b000; color: black; }
    </style>
</head>

<body>

<table>
    <tr>
        <th colspan="3">RGB Colors</th>
    </tr>

    <tr>
        <th rowspan="9">
            E<br>x<br>a<br>m<br>p<br>l<br>e<br>s
        </th>
        <th class="text-black">Black</th>
        <th class="bg-black">#000000</th>
    </tr>

    <tr>
        <th class="text-red">Red</th>
        <th class="bg-red">#ff0000</th>
    </tr>

    <tr>
        <th class="text-green">Green</th>
        <th class="bg-green">#00ff00</th>
    </tr>

    <tr>
        <th class="text-blue">Blue</th>
        <th class="bg-blue">#0000ff</th>
    </tr>

    <tr>
        <th class="text-yellow">Yellow</th>
        <th class="bg-yellow">#ffff00</th>
    </tr>

    <tr>
        <th class="text-magenta">Magenta</th>
        <th class="bg-magenta">#ff00ff</th>
    </tr>

    <tr>
        <th class="text-cyan">Cyan</th>
        <th class="bg-cyan">#00ffff</th>
    </tr>

    <tr>
        <th class="text-white">White</th>
        <th class="bg-white">#ffffff</th>
    </tr>

    <tr>
        <th class="text-mycolor"> My Color</th> 
        <th class="bg-mycolor">#d0b0b0</th>
    </tr>
</table>

</body>
</html>
