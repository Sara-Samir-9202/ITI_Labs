
<html>
<head>
    <title>Task 6</title>
</head>

<body>
<form>

   <table border="1" width="500" cellpadding="10">

    <tr>
        <th colspan="2" align="center"> Registeration Form </th>
    </tr>

    <tr>
        <th width="20%" align="left">UserName</th>
        <td><input type="text" size="60"></td>
    </tr>

    <tr>
        <th width="20%" align="left">UserPass</th>
        <td><input type="password" size="60"></td>
    </tr>

    <tr>
        <th width="20%" align="left">Gender</th>
        <td>
            <input type="radio" name="gender"> Male<br>
            <input type="radio" name="gender"> Female
        </td>
    </tr>

    <tr>
        <th width="20%" align="left"> University</th>
        <td>
            <select>
                <option>Mansoura</option>
                <option>Cairo</option>
                <option>Alexandria</option>
            </select>
        </td>
    </tr>

    <tr>
        <th width="20%" align="left">Courses</th>
        <td>
            <select multiple size="4">
                <option>HyperText Markup Language</option>
                <option>Extensible Markup Language</option>
                <option>Cascading Style Sheet</option>
                <option>Structured Query Language</option>
            </select>
        </td>
    </tr>

    <tr>
        <th width="20%" align="left">CV</td>
        <td><input type="file"></td>
    </tr>

    <tr>
        <th width="20%" align="left">Class</th>
        <td>
            <input type="radio" name="class"> Class A<br>
            <input type="radio" name="class"> Class B<br>
            <input type="radio" name="class"> Class C
        </td>
    </tr>

    <tr>
        <td colspan="2" bgcolor="#f5f5f5"><b>Interests</b></td>
    </tr>

    <tr>
        <td colspan="2">
            <table width="100%">
                <tr>
                    <td><input type="checkbox"> Football</td>
                    <td><input type="checkbox"> Swimming</td>
                    <td><input type="checkbox"> Running</td>
                </tr>
                <tr>
                    <td><input type="checkbox"> Coding</td>
                    <td><input type="checkbox"> Design</td>
                    <td><input type="checkbox"> Writing</td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <input type="submit" value="Register">
            <input type="reset" value="Cancel">
        </td>
    </tr>

</table>

</form>
</body>
</html>
