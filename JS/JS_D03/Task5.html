<html>
<head>
    <title>Bottle Game</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        img {
            width: 300px;
            border: 4px solid gold;
        }

        .stars span {
            font-size: 30px;
            cursor: pointer;
            color: gray;
        }

        .stars span.active {
            color: gold;
        }

        input {
            width: 320px;
            padding: 8px;
            margin-top: 15px;
        }

        button {
            margin-top: 10px;
            padding: 8px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>
<body>

    <h1 style="color: gold;">Bottle Game</h1>
    <img src="Images/bottle.png" alt="Bottle Game">

    <div class="stars">
        <span onclick="rateGame(1)">★</span>
        <span onclick="rateGame(2)">★</span>
        <span onclick="rateGame(3)">★</span>
        <span onclick="rateGame(4)">★</span>
        <span onclick="rateGame(5)">★</span>
    </div>

    <p>Enter names separated by commas:</p>
    <input type="text" id="namesInput" placeholder="Sara,Omar,Mahmoud,Fatma">

    <br>
    <button onclick="playGame()">Play</button>

    <div class="result" id="output"></div>

<script>
let currentRate = 0;

function rateGame(rate) {
    currentRate = rate;
    let stars = document.querySelectorAll(".stars span");

    stars.forEach((star, index) => {
        if (index < rate) {
            star.classList.add("active");
        } else {
            star.classList.remove("active");
        }
    });
}

function playGame() {
    let input = document.getElementById("namesInput").value.trim();
    let names = input.split(",").map(n => n.trim()).filter(n => n !== "");

    if(input === "") {
        alert(" Please enter names!");
        return;
    }

    if(names.length < 2) {
        alert(" Please enter at least two names!");
        return;
    }

  
    let allValid = names.every(n => /^[A-Za-z]+$/.test(n));
    if(!allValid) {
        alert(" Names must contain letters only!");
        return;
    }

   
    let i1 = Math.floor(Math.random() * names.length);
    let i2;
    do {
        i2 = Math.floor(Math.random() * names.length);
    } while (i2 === i1);

    document.getElementById("output").innerHTML =
        `Selected Players: ${names[i1]} & ${names[i2]}`;
}
</script>

</body>
</html>
