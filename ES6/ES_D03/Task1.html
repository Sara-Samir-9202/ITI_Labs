<html>
<head>
    <title>Users</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        #users {
            width: 250px;
            background: #fff;
            border: 2px solid black;
            padding: 10px;
        }

        .user {
            padding: 4px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        .user:hover {
            background: #eee;
        }

        .user.active {
            background: #b3d9ff; 
            font-weight: bold;
        }

        #details {
            margin-top: 10px;
            width: 240px;
            background: #fff;
            border: 2px solid black;
            padding: 15px;
        }
    </style>
</head>
<body>

<h3>Users</h3>
<div id="users"></div>

<h3>User Details</h3>
<div id="details">Click on a user name</div>

<script>
    const usersDiv = document.getElementById("users");
    const detailsDiv = document.getElementById("details");
    let usersData = []; 
    let activeUserDiv = null; 

    fetch("users.json")
        .then(res => res.json())
        .then(users => {
            usersData = users;
            users.forEach(user => {
                const div = document.createElement("div");
                div.className = "user";
                div.textContent = user.name;

                div.onclick = () => showUserDetails(user.id, div);

                usersDiv.appendChild(div);
            });
        })
        .catch(err => console.error("Failed to load users.json:", err));

    function showUserDetails(id, div) {
        const user = usersData.find(u => u.id === id);
        if (!user) return;

     
        detailsDiv.innerHTML = `
            <p><b>Id:</b> ${user.id}</p>
            <p><b>Name:</b> ${user.name}</p>
            <p><b>Email:</b> ${user.email}</p>
        `;

    
        if (activeUserDiv) {
            activeUserDiv.classList.remove("active");
        }

       
        div.classList.add("active");
        activeUserDiv = div; 
    }
</script>

</body>
</html>
