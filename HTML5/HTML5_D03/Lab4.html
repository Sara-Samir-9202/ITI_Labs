<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4 Calc</title>



    <style>
        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        #main-wrapper {
            width: 80%;
            margin: auto;
            border-top-left-radius: 40px;
            border-bottom-right-radius: 40px;
            border: 3px solid black;
            background-color: yellow;
            box-shadow: 0px 0px 6px 5px gray;
            transform: translateY(50%);
            padding: 50px;
            display: flex;
            gap: 10px
        }


        #main-wrapper p {
            font-weight: 800;
            padding-bottom: 30px;
            font-size: 24px;
            text-align: center;
        }

        #main-wrapper .input-container {
            position: relative;
            display: inline-block;
        }

        #main-wrapper input {
            padding: 20px;
            width: 120px;
            border-radius: 5px;
            border: 2px solid gray;
            outline: none;
            font-weight: bolder;
            font-size: 20px;
            text-align: center;
        }

        #main-wrapper .number-controls {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #main-wrapper .number-btn {
            width: 18px;
            height: 18px;
            background-color: transparent;
            color: gray;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            line-height: 1;
        }

        #main-wrapper .number-btn:hover {
            color: black;
        }

        #main-wrapper .number-btn:active {
            transform: scale(0.95);
        }

        #main-wrapper #add,
        #main-wrapper #mul {
            border: 1px solid black;
            padding: 40px;
            width: 50%;
            box-shadow: 1px 1px 15px black inset, -1px -1px 15px black inset;
            background-color: red;
            border-radius: 20px;
        }

        #main-wrapper #add #add-op,
        #main-wrapper #add #mul-op {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        #main-wrapper #mul {
            background-color: green;
        }

        #main-wrapper span {
            font-size: 24px;
            font-weight: bold;
        }

        #main-wrapper output {
            font-size: 24px;
            font-weight: bold;
            min-width: 60px;
            display: inline-block;
            text-align: center;
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid gray;
        }
    </style>

    <script>
        window.addEventListener('load', () => {
             
            function createNumberControls(input) {
                const container = document.createElement('div');
                container.className = 'input-container';
                
                const controls = document.createElement('div');
                controls.className = 'number-controls';
                
                const upBtn = document.createElement('button');
                upBtn.className = 'number-btn';
                upBtn.innerHTML = '▲';
                upBtn.type = 'button';
                
                const downBtn = document.createElement('button');
                downBtn.className = 'number-btn';
                downBtn.innerHTML = '▼';
                downBtn.type = 'button';
                
             
                input.parentNode.insertBefore(container, input);
                container.appendChild(input);
                controls.appendChild(upBtn);
                controls.appendChild(downBtn);
                container.appendChild(controls);
                
                
                upBtn.addEventListener('click', () => {
                    let value = Number(input.value);
                    if (isNaN(value)) value = 0;
                    input.value = value + 1;
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                });
                
                
                downBtn.addEventListener('click', () => {
                    let value = Number(input.value);
                    if (isNaN(value)) value = 0;
                    input.value = value - 1;
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                });
                
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        upBtn.click();
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        downBtn.click();
                    }
                });
            }
            
             
            let allInputs = document.querySelectorAll('#add-op input, #mul-op input');
            allInputs.forEach(input => {
                createNumberControls(input);
            });
            
            
            let addInputs = document.querySelectorAll('#add-op input');
            addInputs.forEach(input => {
                input.addEventListener('input', () => {
                    let sum = 0;
                    addInputs.forEach(inp => {
                        let value = Number(inp.value);
                        if (!isNaN(value)) {
                            sum += value;
                        }
                    });
                    document.getElementById('add-result').innerText = sum;
                });
            });
            
             
            let mulInputs = document.querySelectorAll('#mul-op input');
            mulInputs.forEach(input => {
                input.addEventListener('input', () => {
                    let product = 1;
                    let hasValue = false;
                    
                    mulInputs.forEach(inp => {
                        let value = Number(inp.value);
                        if (inp.value !== '' && !isNaN(value)) {
                            product *= value;
                            hasValue = true;
                        }
                    });
                    
                    document.getElementById('mul-result').innerText = hasValue ? product : '';
                });
            });
            
             
            addInputs.forEach(input => {
                input.dispatchEvent(new Event('input', { bubbles: true }));
            });
            
            mulInputs.forEach(input => {
                input.dispatchEvent(new Event('input', { bubbles: true }));
            });
        });
    </script>
</head>

<body>



    <section id="main-wrapper">


        <div id="add">
            <p>ADDITION</p>
            <div id="add-op">

                <input type="text" id="inpt" value="0">
                <span>+</span>
                <input type="text" value="0">
                <span>=</span>
                <output id="add-result">0</output>
            </div>
        </div>





        <div id="mul">
            <p>MULTIPLICATION</p>
            <div id="mul-op">

                <input type="text" value="0">
                <span>*</span>
                <input type="text" value="0">
                <span>=</span>
                <output id="mul-result">0</output>
            </div>



        </div>
    </section>

</body>

</html>
